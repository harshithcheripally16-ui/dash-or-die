<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celestial Fluid Grid | Digital Flux</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Orbitron:wght@800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <header class="luxury-ui-header">
      <div class="header-left">
        <p class="ui-label">PROTOCOL_GRID_v4</p>
        <h1 class="ui-title">CELESTIAL <span class="accent">FLUID</span> GRID</h1>
      </div>
      <div class="header-right">
        <div class="stat-group">
          <p class="ui-label">ACTIVE_THEME</p>
          <p id="theme-display" class="ui-value">SOLAR</p>
        </div>
        <div class="stat-group">
          <p class="ui-label">FLOW_PHASE</p>
          <p id="flow-display" class="ui-value">STABLE</p>
        </div>
        <div class="stat-group">
          <p class="ui-label">OCTAVES</p>
          <p id="octave-display" class="ui-value">4.0</p>
        </div>
      </div>
    </header>

    <main class="grid-container">
      <div id="fluid-grid" class="fluid-grid">
        <!-- Tiles generated by JS for performance -->
      </div>
    </main>

    <footer class="luxury-ui-footer">
      <div class="control-panel">
        <div class="control-group">
          <label for="theme-selector" class="ui-label">THEME_CATEGORY</label>
          <select id="theme-selector" class="ui-select">
            <option value="solar">SOLAR</option>
            <option value="vortex">VORTEX</option>
            <option value="nebula">NEBULA</option>
            <option value="stardust">STARDUST</option>
            <option value="shimmer">SHIMMER</option>
          </select>
        </div>
        
        <div class="control-group slider-group">
          <div class="label-row">
            <label for="flow-velocity" class="ui-label">FLOW_VELOCITY</label>
            <span id="velocity-val" class="ui-label accent">1.0X</span>
          </div>
          <input type="range" id="flow-velocity" min="0.1" max="5.0" step="0.1" value="1.0" class="ui-slider">
        </div>
      </div>
    </footer>
  </div>
  <script type="module" src="/main.js"></script>
</body>
</html>
